<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SolarLearn - Interactive Solar System</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            font-family: Arial, sans-serif;
            color: white;
        }

        canvas {
            display: block;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;

            display: flex;
            justify-content: center;
            align-items: center;

            z-index: 9999;
        }

        #loadingUI {
            text-align: center;
            color: white;
        }

        #loadingUI h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        #progressContainer {
            width: 300px;
            height: 6px;
            background: #222;
            margin: 0 auto 10px;
            border-radius: 4px;
            overflow: hidden;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            /* background: #4da6ff; */
            transition: width 0.2s;
            background: linear-gradient(90deg, #4da6ff, #66ccff);
        }


        #progressText {
            font-size: 16px;
            opacity: 0.8;
        }
    </style>

</head>

<body>


    <div id="loadingScreen">

        <div id="loadingUI">

            <h1>SOLAR LEARN</h1>

            <div id="progressContainer">
                <div id="progressBar"></div>
            </div>

            <p id="progressText">Loading 0%</p>

        </div>

    </div>

    <div id="controls">
        <h3>Planet Speed Controls</h3>
    </div>


    <script type="module" src="./js/scene.js"></script>


</body>

</html>
