<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SolarLearn - Interactive Solar System</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial, sans-serif;
color:white;
}

canvas{
display:block;
}

#controls{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:8px;
backdrop-filter: blur(10px);
}

#loading-screen{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:black;
font-size:24px;
z-index:10;
}

</style>

</head>

<body>


<div id="loading-screen">
Loading Solar System...
</div>


<div id="controls">
<h3>Planet Speed Controls</h3>
</div>


<script type="module" src="./js/scene.js"></script>


</body>
</html>
